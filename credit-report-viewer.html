<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporte de Crédito — Visor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0e0e10;
      color: #e2e8f0;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .viewer-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: linear-gradient(145deg, rgba(22,22,24,0.92), rgba(14,14,16,0.88));
      border-bottom: 1px solid rgba(155,179,210,0.16);
      backdrop-filter: blur(40px) saturate(160%);
      flex-shrink: 0;
      z-index: 100;
    }

    .viewer-title {
      font-size: 14px;
      font-weight: 600;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 300px;
    }

    .viewer-separator {
      width: 1px;
      height: 24px;
      background: rgba(155,179,210,0.2);
      flex-shrink: 0;
    }

    /* ── Search Bar ── */
    .search-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      max-width: 500px;
    }

    .search-input {
      flex: 1;
      padding: 7px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(155,179,210,0.18);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus {
      border-color: #39b0ff;
      box-shadow: 0 0 0 3px rgba(57,176,255,0.15);
    }
    .search-input::placeholder { color: rgba(255,255,255,0.3); }

    .search-info {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
      min-width: 60px;
      text-align: center;
    }

    .btn-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(155,179,210,0.15);
      border-radius: 6px;
      color: #e2e8f0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-nav:hover { background: rgba(255,255,255,0.12); }
    .btn-nav:disabled { opacity: 0.3; cursor: default; }

    /* ── Broadcast indicator ── */
    .broadcast-badge {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: rgba(57,176,255,0.12);
      border: 1px solid rgba(57,176,255,0.25);
      border-radius: 8px;
      font-size: 12px;
      color: #39b0ff;
      white-space: nowrap;
      animation: badge-pulse 1.5s ease-in-out;
    }
    .broadcast-badge.active { display: flex; }
    @keyframes badge-pulse {
      0% { background: rgba(57,176,255,0.3); }
      100% { background: rgba(57,176,255,0.12); }
    }

    .broadcast-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #39b0ff;
      animation: dot-blink 1.2s infinite;
    }
    @keyframes dot-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Page placeholder (lazy loading) ── */
    .page-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.15);
      font-size: 14px;
    }

    /* ── Page info ── */
    .page-info {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
      margin-left: auto;
    }

    /* ── PDF Container ── */
    .pdf-container {
      flex: 1;
      overflow: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      background: #0a0f1a;
    }

    .pdf-page-wrapper {
      position: relative;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .pdf-page-wrapper canvas {
      display: block;
    }

    /* ── Text Layer (PDF.js) ── */
    .textLayer {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      line-height: 1;
    }

    .textLayer > span {
      color: transparent;
      position: absolute;
      white-space: pre;
      transform-origin: 0% 0%;
    }

    .textLayer .highlight-match {
      background: rgba(57,176,255,0.4);
      border-radius: 2px;
      color: transparent;
    }

    .textLayer .highlight-match.active {
      background: rgba(255,200,0,0.55);
    }

    /* ── Loading ── */
    .loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      height: 100%;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #39b0ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #f87171;
      text-align: center;
      padding: 40px;
      font-size: 14px;
    }

    /* ── Zoom Controls ── */
    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .zoom-label {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      min-width: 40px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="viewer-header">
    <svg viewBox="0 0 24 24" fill="none" stroke="#39b0ff" stroke-width="2" width="18" height="18">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <span class="viewer-title" id="viewerTitle">Cargando...</span>

    <div class="viewer-separator"></div>

    <div class="search-group">
      <input type="text" class="search-input" id="searchInput" placeholder="Buscar en el documento..." />
      <span class="search-info" id="searchInfo"></span>
      <button class="btn-nav" id="btnPrev" title="Anterior" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="btn-nav" id="btnNext" title="Siguiente" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="9 6 15 12 9 18"/></svg>
      </button>
    </div>

    <div class="broadcast-badge" id="broadcastBadge">
      <span class="broadcast-dot"></span>
      <span id="broadcastText">Buscando...</span>
    </div>

    <div class="viewer-separator"></div>

    <div class="zoom-controls">
      <button class="btn-nav" id="btnZoomOut" title="Reducir">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <span class="zoom-label" id="zoomLabel">100%</span>
      <button class="btn-nav" id="btnZoomIn" title="Ampliar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <span class="page-info" id="pageInfo"></span>
  </div>

  <div class="pdf-container" id="pdfContainer">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <span>Cargando documento...</span>
    </div>
  </div>

  <script src="vendor/pdf.min.js"></script>
  <script>
    // Fix: pdf.js crea canvas internos para SMask compositing sin willReadFrequently.
    // Esto causa renderizado negro en PDFs con máscaras de transparencia.
    (function() {
      var _origGetContext = HTMLCanvasElement.prototype.getContext;
      HTMLCanvasElement.prototype.getContext = function(type, attrs) {
        if (type === '2d') {
          attrs = Object.assign({}, attrs || {}, { willReadFrequently: true });
        }
        return _origGetContext.call(this, type, attrs);
      };
    })();
  </script>
  <script src="credit-report-viewer.js?v=20260226b"></script>
</body>
</html>
